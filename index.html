<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islamic World</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%);
            color: #fff;
            overflow-x: hidden;
        }

        /* ===== VISITOR MODE ===== */
        header {
            background: rgba(15, 20, 25, 0.95);
            border-bottom: 2px solid #d4af37;
            padding: 2rem;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            animation: slideDown 0.8s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #d4af37, #1a7659);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            box-shadow: 0 8px 24px rgba(212, 175, 55, 0.3);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            color: #d4af37;
            font-weight: 900;
            letter-spacing: -1px;
        }

        .subtitle {
            color: #999;
            font-size: 1rem;
            margin-top: 0.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .tabs {
            display: flex;
            gap: 2rem;
            border-bottom: 2px solid #d4af37;
            margin-bottom: 3rem;
            overflow-x: auto;
        }

        .tab-btn {
            padding: 1rem 1.5rem;
            background: none;
            border: none;
            color: #666;
            font-weight: 600;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .tab-btn:hover {
            color: #d4af37;
        }

        .tab-btn.active {
            color: #d4af37;
            border-bottom-color: #d4af37;
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2rem;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .card {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.05), rgba(26, 118, 89, 0.05));
            border: 2px solid #d4af37;
            border-radius: 16px;
            padding: 2rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.320, 1);
            position: relative;
            overflow: hidden;
            animation: scaleIn 0.6s ease backwards;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.2s; }
        .card:nth-child(3) { animation-delay: 0.3s; }
        .card:nth-child(4) { animation-delay: 0.4s; }
        .card:nth-child(5) { animation-delay: 0.5s; }
        .card:nth-child(6) { animation-delay: 0.6s; }

        .card:hover {
            transform: translateY(-15px);
            box-shadow: 0 20px 50px rgba(212, 175, 55, 0.2);
            border-color: #1a7659;
        }

        .card-badge {
            display: inline-block;
            padding: 0.6rem 1.2rem;
            background: #1a7659;
            color: #f5f1e8;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-bottom: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            margin-bottom: 1rem;
            color: #fff;
            font-weight: 700;
        }

        .card p {
            color: #bbb;
            line-height: 1.8;
            margin-bottom: 1.5rem;
            font-weight: 300;
        }

        .card-tags {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .tag {
            padding: 0.4rem 0.9rem;
            background: rgba(212, 175, 55, 0.15);
            color: #d4af37;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #666;
            grid-column: 1 / -1;
        }

        footer {
            border-top: 2px solid #d4af37;
            background: rgba(15, 20, 25, 0.9);
            padding: 2rem;
            text-align: center;
            color: #888;
            margin-top: 3rem;
        }

        /* ===== ADMIN BUTTON ===== */
        .admin-btn-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, #d4af37, #1a7659);
            border: none;
            border-radius: 50%;
            color: #000;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(212, 175, 55, 0.4);
            transition: all 0.3s;
            z-index: 40;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-15px);
            }
        }

        .admin-btn-float:hover {
            transform: scale(1.15);
            box-shadow: 0 12px 36px rgba(212, 175, 55, 0.6);
        }

        /* ===== LOGIN MODAL ===== */
        .login-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .login-modal.active {
            display: flex;
        }

        .login-box {
            background: linear-gradient(135deg, rgba(15, 20, 25, 0.98), rgba(26, 118, 89, 0.1));
            border: 2px solid #d4af37;
            border-radius: 20px;
            padding: 3rem;
            max-width: 420px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(212, 175, 55, 0.2);
            animation: popIn 0.4s ease;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .login-box h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: #d4af37;
            margin-bottom: 1rem;
        }

        .login-box p {
            color: #aaa;
            margin-bottom: 2rem;
        }

        .login-input {
            width: 100%;
            padding: 0.9rem;
            background: rgba(212, 175, 55, 0.05);
            border: 2px solid #d4af37;
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 1.5rem;
            transition: all 0.3s;
        }

        .login-input:focus {
            outline: none;
            background: rgba(212, 175, 55, 0.1);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.2);
        }

        .login-submit {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #d4af37, #1a7659);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .login-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
        }

        .login-error {
            color: #ff6b6b;
            display: none;
            margin-top: 1rem;
            font-weight: 600;
        }

        .login-cancel {
            width: 100%;
            padding: 0.7rem;
            background: transparent;
            border: 2px solid #d4af37;
            color: #d4af37;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 1rem;
            transition: all 0.3s;
        }

        .login-cancel:hover {
            background: #d4af37;
            color: #000;
        }

        /* ===== ADMIN MODE ===== */
        .admin-mode {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%);
            z-index: 999;
            display: none;
            flex-direction: column;
            overflow: hidden;
        }

        .admin-mode.active {
            display: flex;
        }

        .admin-header {
            background: rgba(212, 175, 55, 0.1);
            border-bottom: 2px solid #d4af37;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-header h2 {
            font-family: 'Playfair Display', serif;
            color: #d4af37;
            font-size: 1.8rem;
        }

        .admin-controls {
            display: flex;
            gap: 1rem;
        }

        .admin-btn {
            padding: 0.7rem 1.5rem;
            background: linear-gradient(135deg, #d4af37, #1a7659);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .admin-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3);
        }

        .admin-btn.exit {
            background: transparent;
            border: 2px solid #d4af37;
            color: #d4af37;
        }

        .admin-btn.exit:hover {
            background: #d4af37;
            color: #000;
        }

        .admin-content {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .admin-section {
            background: rgba(212, 175, 55, 0.05);
            border: 2px solid #d4af37;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 2rem;
        }

        .admin-section h3 {
            color: #d4af37;
            font-size: 1.3rem;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .item {
            background: rgba(26, 118, 89, 0.1);
            border: 1px solid #1a7659;
            border-radius: 8px;
            padding: 1.2rem;
            margin-bottom: 0.8rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s;
        }

        .item:hover {
            background: rgba(26, 118, 89, 0.15);
            border-color: #d4af37;
        }

        .item-info h4 {
            color: #d4af37;
            margin-bottom: 0.3rem;
        }

        .item-info p {
            color: #888;
            font-size: 0.9rem;
        }

        .item-actions {
            display: flex;
            gap: 0.5rem;
        }

        .item-btn {
            padding: 0.4rem 0.8rem;
            background: transparent;
            border: 1px solid #1a7659;
            color: #1a7659;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .item-btn:hover {
            background: #1a7659;
            color: #fff;
        }

        .item-btn.delete {
            border-color: #ff6b6b;
            color: #ff6b6b;
        }

        .item-btn.delete:hover {
            background: #ff6b6b;
            color: #fff;
        }

        /* ===== FORM MODAL ===== */
        .form-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1500;
            align-items: center;
            justify-content: center;
            overflow-y: auto;
            backdrop-filter: blur(5px);
            padding: 2rem 0;
        }

        .form-modal.active {
            display: flex;
        }

        .form-box {
            background: linear-gradient(135deg, rgba(15, 20, 25, 0.98), rgba(26, 118, 89, 0.1));
            border: 2px solid #d4af37;
            border-radius: 16px;
            padding: 2.5rem;
            max-width: 500px;
            width: 95%;
            box-shadow: 0 20px 60px rgba(212, 175, 55, 0.2);
            animation: popIn 0.4s ease;
        }

        .form-box h2 {
            font-family: 'Playfair Display', serif;
            color: #d4af37;
            margin-bottom: 1.5rem;
            font-size: 1.6rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            color: #d4af37;
            font-weight: 600;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.8rem;
            background: rgba(212, 175, 55, 0.05);
            border: 2px solid #d4af37;
            border-radius: 8px;
            color: #fff;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            background: rgba(212, 175, 55, 0.1);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .tags-input {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 0.8rem;
            background: rgba(212, 175, 55, 0.05);
            border: 2px solid #d4af37;
            border-radius: 8px;
            min-height: 42px;
            align-content: flex-start;
        }

        .tag-item {
            background: #1a7659;
            color: #fff;
            padding: 0.4rem 0.8rem;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .tag-item button {
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
            font-size: 1rem;
            padding: 0;
        }

        .tags-input input {
            border: none !important;
            background: transparent !important;
            color: #fff;
            flex: 1;
            min-width: 80px;
            padding: 0 !important;
            font-size: 0.95rem;
        }

        .tags-input input:focus {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
        }

        .form-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }

        .btn-save {
            flex: 1;
            padding: 0.8rem;
            background: linear-gradient(135deg, #d4af37, #1a7659);
            border: none;
            border-radius: 8px;
            color: #000;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3);
        }

        .btn-cancel {
            flex: 1;
            padding: 0.8rem;
            background: transparent;
            border: 2px solid #d4af37;
            border-radius: 8px;
            color: #d4af37;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .btn-cancel:hover {
            background: #d4af37;
            color: #000;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .admin-btn-float {
                width: 55px;
                height: 55px;
                font-size: 24px;
                bottom: 20px;
                right: 20px;
            }

            .form-box, .login-box {
                width: 95%;
            }
        }
    </style>
</head>
<body>
    <!-- ===== VISITOR MODE ===== -->
    <div class="visitor-mode" id="visitorMode">
        <header>
            <div class="header-inner">
                <div class="logo">
                    <div class="logo-icon">ع</div>
                    <div>
                        <h1>Islamic World</h1>
                        <p class="subtitle">Knowledge Hub</p>
                    </div>
                </div>
            </div>
        </header>

        <main>
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('articles', this)">📖 Articles</button>
                <button class="tab-btn" onclick="switchTab('pdfs', this)">📄 PDFs</button>
                <button class="tab-btn" onclick="switchTab('books', this)">📚 Books</button>
            </div>

            <div class="content-grid" id="contentGrid"></div>
        </main>

        <footer>
            <p>© 2024 Islamic World - Knowledge Hub</p>
            <p>Spreading Islamic Knowledge</p>
        </footer>
    </div>

    <!-- ===== ADMIN BUTTON ===== -->
    <button class="admin-btn-float" onclick="openLoginModal()" id="adminBtn">🔒</button>

    <!-- ===== LOGIN MODAL ===== -->
    <div class="login-modal" id="loginModal">
        <div class="login-box">
            <h2>🔐 Admin</h2>
            <p>Enter password to access admin panel</p>
            <form onsubmit="handleLogin(event)">
                <input type="password" id="passwordInput" class="login-input" placeholder="Password" required autofocus>
                <button type="submit" class="login-submit">LOGIN</button>
            </form>
            <div class="login-error" id="loginError">❌ Incorrect password</div>
            <button type="button" class="login-cancel" onclick="closeLoginModal()">CANCEL</button>
        </div>
    </div>

    <!-- ===== ADMIN MODE ===== -->
    <div class="admin-mode" id="adminMode">
        <div class="admin-header">
            <h2>⚙️ Admin Panel</h2>
            <div class="admin-controls">
                <button class="admin-btn" onclick="openAddForm()">+ ADD</button>
                <button class="admin-btn exit" onclick="exitAdmin()">EXIT</button>
            </div>
        </div>

        <div class="admin-content">
            <div class="admin-section">
                <h3>📖 Articles</h3>
                <div id="articlesList"></div>
            </div>
            <div class="admin-section">
                <h3>📄 PDFs</h3>
                <div id="pdfsList"></div>
            </div>
            <div class="admin-section">
                <h3>📚 Books</h3>
                <div id="booksList"></div>
            </div>
        </div>
    </div>

    <!-- ===== FORM MODAL ===== -->
    <div class="form-modal" id="formModal">
        <div class="form-box">
            <h2 id="formTitle">Add Content</h2>
            <form onsubmit="handleSubmit(event)">
                <div class="form-group">
                    <label>Type</label>
                    <select id="type" required>
                        <option value="articles">Article</option>
                        <option value="pdfs">PDF</option>
                        <option value="books">Book</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="title" placeholder="Title" required>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea id="description" placeholder="Description" required></textarea>
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <input type="text" id="category" placeholder="e.g., Fiqh" required>
                </div>

                <div class="form-group">
                    <label>Tags (Press Enter)</label>
                    <div class="tags-input" id="tagsInput">
                        <input type="text" id="tagInput" placeholder="Add tags..." onkeypress="handleTagInput(event)">
                    </div>
                </div>

                <div class="form-buttons">
                    <button type="submit" class="btn-save">SAVE</button>
                    <button type="button" class="btn-cancel" onclick="closeFormModal()">CANCEL</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = 'Islamic123';
        let currentTab = 'articles';
        let tempTags = [];

        if (!localStorage.getItem('islamicContent')) {
            localStorage.setItem('islamicContent', JSON.stringify({
                articles: [{
                    id: 1,
                    title: 'Islamic Creed Fundamentals',
                    description: 'Core principles of Islamic belief',
                    category: 'Aqeedah',
                    tags: ['Aqeedah', 'Theology'],
                    type: 'articles'
                }],
                pdfs: [],
                books: []
            }));
        }

        function loadContent() {
            const data = JSON.parse(localStorage.getItem('islamicContent'));
            renderContent(data[currentTab]);
        }

        function renderContent(items) {
            const grid = document.getElementById('contentGrid');
            if (!items || items.length === 0) {
                grid.innerHTML = '<div class="empty-state">📭 No content</div>';
                return;
            }
            grid.innerHTML = items.map(item => `
                <div class="card">
                    <div class="card-badge">${item.category}</div>
                    <h3>${item.title}</h3>
                    <p>${item.description}</p>
                    <div class="card-tags">
                        ${item.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        function switchTab(tab, btn) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadContent();
        }

        function openLoginModal() {
            document.getElementById('loginModal').classList.add('active');
            document.getElementById('passwordInput').focus();
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.remove('active');
            document.getElementById('passwordInput').value = '';
            document.getElementById('loginError').style.display = 'none';
        }

        function handleLogin(e) {
            e.preventDefault();
            const password = document.getElementById('passwordInput').value;
            if (password === ADMIN_PASSWORD) {
                closeLoginModal();
                document.getElementById('visitorMode').style.display = 'none';
                document.getElementById('adminBtn').style.display = 'none';
                document.getElementById('adminMode').classList.add('active');
                loadAdminContent();
            } else {
                document.getElementById('loginError').style.display = 'block';
                document.getElementById('passwordInput').value = '';
            }
        }

        function exitAdmin() {
            document.getElementById('adminMode').classList.remove('active');
            document.getElementById('visitorMode').style.display = 'block';
            document.getElementById('adminBtn').style.display = 'flex';
            loadContent();
        }

        function loadAdminContent() {
            const data = JSON.parse(localStorage.getItem('islamicContent'));
            document.getElementById('articlesList').innerHTML = renderAdminList(data.articles);
            document.getElementById('pdfsList').innerHTML = renderAdminList(data.pdfs);
            document.getElementById('booksList').innerHTML = renderAdminList(data.books);
        }

        function renderAdminList(items) {
            if (!items || items.length === 0) return '<p style="color: #666;">No items</p>';
            return items.map(item => `
                <div class="item">
                    <div class="item-info">
                        <h4>${item.title}</h4>
                        <p>${item.description.substring(0, 50)}...</p>
                    </div>
                    <div class="item-actions">
                        <button class="item-btn" onclick="editItem('${item.type}', ${item.id})">Edit</button>
                        <button class="item-btn delete" onclick="deleteItem('${item.type}', ${item.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        }

        function openAddForm() {
            tempTags = [];
            document.getElementById('formTitle').textContent = 'Add Content';
            resetForm();
            document.getElementById('formModal').classList.add('active');
        }

        function closeFormModal() {
            document.getElementById('formModal').classList.remove('active');
        }

        function resetForm() {
            document.getElementById('type').value = 'articles';
            document.getElementById('title').value = '';
            document.getElementById('description').value = '';
            document.getElementById('category').value = '';
            document.getElementById('tagInput').value = '';
            updateTagsDisplay();
        }

        function handleTagInput(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                const tag = document.getElementById('tagInput').value.trim();
                if (tag && !tempTags.includes(tag)) {
                    tempTags.push(tag);
                    document.getElementById('tagInput').value = '';
                    updateTagsDisplay();
                }
            }
        }

        function removeTag(tag) {
            tempTags = tempTags.filter(t => t !== tag);
            updateTagsDisplay();
        }

        function updateTagsDisplay() {
            const tagsInput = document.getElementById('tagsInput');
            const tagInput = document.getElementById('tagInput');
            tagsInput.innerHTML = tempTags.map(tag => `
                <div class="tag-item">
                    ${tag}<button type="button" onclick="removeTag('${tag}')">×</button>
                </div>
            `).join('');
            tagsInput.appendChild(tagInput);
        }

        function handleSubmit(e) {
            e.preventDefault();
            const data = JSON.parse(localStorage.getItem('islamicContent'));
            const type = document.getElementById('type').value;
            const item = {
                id: Date.now(),
                title: document.getElementById('title').value,
                description: document.getElementById('description').value,
                category: document.getElementById('category').value,
                tags: tempTags,
                type: type
            };
            data[type].push(item);
            localStorage.setItem('islamicContent', JSON.stringify(data));
            closeFormModal();
            loadAdminContent();
            alert('✅ Saved!');
        }

        function deleteItem(type, id) {
            if (confirm('Delete?')) {
                const data = JSON.parse(localStorage.getItem('islamicContent'));
                data[type] = data[type].filter(i => i.id !== id);
                localStorage.setItem('islamicContent', JSON.stringify(data));
                loadAdminContent();
            }
        }

        function editItem(type, id) {
            const data = JSON.parse(localStorage.getItem('islamicContent'));
            const item = data[type].find(i => i.id === id);
            tempTags = [...item.tags];
            document.getElementById('formTitle').textContent = 'Edit Content';
            document.getElementById('type').value = type;
            document.getElementById('title').value = item.title;
            document.getElementById('description').value = item.description;
            document.getElementById('category').value = item.category;
            updateTagsDisplay();
            document.getElementById('formModal').classList.add('active');
        }

        loadContent();
    </script>
</body>
</html>
