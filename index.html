<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Islamic Knowledge Hub - Authentic articles, PDFs, and books on Aqeedah, Fiqh, Hadith, Seerah and more.">
    <title>Islamic World — Knowledge Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --emerald: #1a7659;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f1419 0%, #1a1f2e 100%);
            color: #fff;
            overflow-x: hidden;
            line-height: 1.7;
        }

        /* Header */
        header {
            background: rgba(15, 20, 25, 0.98);
            border-bottom: 2px solid var(--gold);
            padding: 1rem 5%;
            position: sticky; top: 0; z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }
        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            display: flex; align-items: center; gap: 12px;
            text-decoration: none; color: var(--gold);
        }
        .logo-icon {
            width: 50px; height: 50px;
            background: linear-gradient(135deg, var(--gold), var(--emerald));
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; font-weight: bold;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float { 50% { transform: translateY(-6px); } }

        .nav-links {
            display: flex; gap: 2rem; align-items: center;
        }
        .nav-links a {
            color: #ccc; text-decoration: none; font-weight: 600;
            transition: all 0.3s;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--gold); }

        /* Hamburger */
        .hamburger { display: none; font-size: 1.8rem; cursor: pointer; }

        /* Hero */
        .hero {
            padding: 6rem 5% 4rem;
            text-align: center;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), url('https://source.unsplash.com/random/1600x900/?islamic-pattern') center/cover;
        }
        .hero h1 { font-family: 'Playfair Display', serif; font-size: 3.8rem; margin: 1rem 0; color: var(--gold); }
        .hero p { font-size: 1.25rem; max-width: 700px; margin: 0 auto 2rem; color: #ddd; }

        /* Stats */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1.5rem;
            max-width: 1200px;
            margin: -4rem auto 4rem;
            padding: 0 5%;
            position: relative; z-index: 10;
        }
        .stat-card {
            background: rgba(212,175,55,0.1);
            border: 2px solid var(--gold);
            border-radius: 16px;
            padding: 2rem;
            text-align: center;
            transition: transform 0.3s;
        }
        .stat-card:hover { transform: translateY(-8px); }
        .stat-number { font-size: 3.2rem; font-weight: 900; color: var(--gold); }

        /* Search */
        .search-bar {
            max-width: 600px; margin: 2rem auto; padding: 0 5%;
        }
        .search-bar input {
            width: 100%; padding: 1rem 1.5rem;
            background: rgba(255,255,255,0.1);
            border: 2px solid var(--gold);
            border-radius: 50px;
            color: white; font-size: 1.1rem;
        }

        /* Main */
        main { max-width: 1300px; margin: 0 auto; padding: 0 5%; }
        .tabs { display: flex; gap: 1.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .tab-btn {
            padding: 0.9rem 1.8rem;
            background: transparent;
            border: 2px solid transparent;
            color: #aaa;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab-btn.active {
            background: var(--gold);
            color: #000;
            border-color: var(--gold);
        }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2rem;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border: 2px solid var(--gold);
            border-radius: 16px;
            padding: 1.8rem;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:hover {
            transform: translateY(-12px);
            box-shadow: 0 25px 50px rgba(212,175,55,0.25);
            border-color: var(--emerald);
        }

        /* Detail Page */
        .detail-page {
            display: none; position: fixed; inset: 0;
            background: #f8f4eb; z-index: 999; overflow-y: auto;
        }
        .detail-page.active { display: block; }

        /* Footer & others same as before with small improvements */

        @media (max-width: 768px) {
            .nav-links { display: none; position: fixed; top: 70px; left: 0; right: 0; background: #0f1419; flex-direction: column; padding: 2rem; }
            .nav-links.show { display: flex; }
            .hamburger { display: block; }
            .hero h1 { font-size: 2.6rem; }
        }
    </style>
</head>

                <a onclick="showAbout()">About</a>
            </div>
            <div class="hamburger" onclick="toggleMenu()">☰</div>
        </div>
    </header>

                <p>Authentic resources for seekers of Islamic knowledge</p>

                    <button class="btn btn-primary" onclick="scrollToContent()" style="padding:1rem 2.5rem;font-size:1.1rem;">Browse Library</button>
                </div>
            </div>
